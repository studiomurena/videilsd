<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Murena - Live Visuals</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Effetto monitor CRT -->
    <div class="crt-overlay"></div>
    
    <!-- Griglia dei video -->
    <div class="video-container">
        <!-- Usa playsinline e muted per garantire l'autoplay continuo -->
        <video id="v1" src="video1.mp4" autoplay loop muted playsinline></video>
        <video id="v2" src="video2.mp4" autoplay loop muted playsinline></video>
        <video id="v3" src="video3.mp4" autoplay loop muted playsinline></video>
        <video id="v4" src="video4.mp4" autoplay loop muted playsinline></video>
    </div>

    <!-- Il logo che se la viaggia -->
    <img id="crazy-logo" src="studiomurenalogo.png" alt="Studio Murena Logo">

    <script src="script.js"></script>
</body>
</html>
