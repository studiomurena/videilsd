<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visuals Live</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <button id="start-btn">START VISUALS</button>
    </div>

    <div class="crt-overlay"></div>
    
    <div class="video-container">
        <video id="v1" src="video1.mp4" loop muted playsinline></video>
        <video id="v2" src="video2.mp4" loop muted playsinline></video>
        <video id="v3" src="video3.mp4" loop muted playsinline></video>
        <video id="v4" src="video4.mp4" loop muted playsinline></video>
    </div>

    <img id="crazy-logo" src="studiomurenalogo.png" alt="Logo">

    <script src="script.js"></script>
</body>
</html>
